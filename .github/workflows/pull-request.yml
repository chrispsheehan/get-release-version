name: Pull Request

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        review_requested,
        ready_for_review,
        edited,
      ]
  workflow_dispatch:
    inputs:
      pr_title:
        description: "PR title to validate and use for version preview when running manually"
        required: false
        type: string
        default: "fix: manual workflow dispatch"

jobs:
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
      ALLOWED_TITLE_PATTERN: '^(feat|fix|chore|docs)(\([A-Za-z0-9._/-]+\))?!?: .+'
    steps:
      - name: Fail if PR title is not a supported Conventional Commit
        run: |
          echo "PR title: $PR_TITLE"
          if [[ "$PR_TITLE" =~ $ALLOWED_TITLE_PATTERN ]]; then
            echo "PR title is valid."
            exit 0
          fi
          echo "::error::PR title must be a supported Conventional Commit, for example feat: add output or feat(v1)!: change API"
          exit 1

  unit-test:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: python -m unittest discover -v -s tests -p 'test_unit_*.py'

  functional-test:
    runs-on: ubuntu-latest
    needs: unit-test
    name: Functional Tests

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: python -m unittest discover -v -s tests -p 'test_unit_*.py'

      - name: Run functional tests
        run: python tests/test_functional_versioning.py

  end-to-end:
    name: End-to-End Test
    runs-on: ubuntu-latest
    needs: functional-test

    steps:
      - uses: actions/checkout@v6

      - name: Run local action for minor bump
        id: get-next-version-minor
        uses: ./
        with:
          subjects: "feat: exercise local action end to end"

      - name: Show action outputs
        run: |
          echo "currentVersion=${{ steps.get-next-version-minor.outputs.currentVersion }}"
          echo "version=${{ steps.get-next-version-minor.outputs.version }}"
          echo "createNewTag=${{ steps.get-next-version-minor.outputs.createNewTag }}"
          echo "createNewRelease=${{ steps.get-next-version-minor.outputs.createNewRelease }}"
          echo "majorAlias=${{ steps.get-next-version-minor.outputs.majorAlias }}"
          echo "createMajorAlias=${{ steps.get-next-version-minor.outputs.createMajorAlias }}"
          echo "bump=${{ steps.get-next-version-minor.outputs.bump }}"

      - name: Assert minor bump outputs
        run: |
          test "${{ steps.get-next-version-minor.outputs.bump }}" = "minor"
          test "${{ steps.get-next-version-minor.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-minor.outputs.createNewRelease }}" = "true"

  show-next-version:
    name: Next Version Action
    needs:
      - check-pr-title
      - end-to-end
    runs-on: ubuntu-latest
    env:
      ENABLE_MAJOR_ALIAS: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute action
        id: get_next_version
        uses: ./
        with:
          subjects: ${{ github.event.pull_request.title || inputs.pr_title }}
          tag_prefix: v
          major_alias: ${{ env.ENABLE_MAJOR_ALIAS }}

      - name: Show action outputs
        run: |
          echo "currentVersion=${{ steps.get_next_version.outputs.currentVersion }}"
          echo "version=${{ steps.get_next_version.outputs.version }}"
          echo "createNewTag=${{ steps.get_next_version.outputs.createNewTag }}"
          echo "createNewRelease=${{ steps.get_next_version.outputs.createNewRelease }}"
          echo "majorAlias=${{ steps.get_next_version.outputs.majorAlias }}"
          echo "createMajorAlias=${{ steps.get_next_version.outputs.createMajorAlias }}"
          echo "bump=${{ steps.get_next_version.outputs.bump }}"
