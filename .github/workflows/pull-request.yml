name: Pull Request

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        review_requested,
        ready_for_review,
        edited,
      ]
  workflow_dispatch:
    inputs:
      pr_title:
        description: "PR title to validate and use for version preview when running manually"
        required: false
        type: string
        default: "fix: manual workflow dispatch"

jobs:
  check-pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
      ALLOWED_PREFIXES: "feat: feat!: fix: fix!: chore: docs:"
    steps:
      - name: Fail if PR title does not start with an allowed prefix
        run: |
          echo "PR title: $PR_TITLE"
          for prefix in $ALLOWED_PREFIXES; do
            if [[ "$PR_TITLE" == "$prefix"* ]]; then
              echo "✅ PR title is valid."
              exit 0
            fi
          done
          echo "::error::❌ PR title must start with one of: $ALLOWED_PREFIXES"
          exit 1

  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: python -m unittest discover -v -s tests -p 'test_unit_*.py'

      - name: Run functional tests
        run: python tests/test_functional_versioning.py

  end-to-end-tests:
    name: End-to-end Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Run local action for minor bump
        id: get-next-version-minor
        uses: ./
        with:
          subjects: "feat: exercise local action end to end"

      - name: Assert minor bump outputs
        run: |
          test "${{ steps.get-next-version-minor.outputs.bump }}" = "minor"
          test "${{ steps.get-next-version-minor.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-minor.outputs.createNewRelease }}" = "true"

      - name: Create temp baseline tag
        run: git tag -f 1.2.3

      - name: Run local action for patch bump
        id: get-next-version-patch
        uses: ./
        with:
          subjects: "fix: exercise patch tag output"

      - name: Assert patch bump outputs
        run: |
          test "${{ steps.get-next-version-patch.outputs.bump }}" = "patch"
          test "${{ steps.get-next-version-patch.outputs.currentVersion }}" = "1.2.3"
          test "${{ steps.get-next-version-patch.outputs.version }}" = "1.2.4"
          test "${{ steps.get-next-version-patch.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-patch.outputs.createNewRelease }}" = "true"

      - name: Create temp short baseline tag
        run: |
          git tag -d 1.2.3
          git tag -f 1.1

      - name: Run local action for short tag normalization
        id: get-next-version-short-tag
        uses: ./
        with:
          subjects: "fix: exercise short tag output"

      - name: Assert short tag outputs
        run: |
          test "${{ steps.get-next-version-short-tag.outputs.bump }}" = "patch"
          test "${{ steps.get-next-version-short-tag.outputs.currentVersion }}" = "1.1"
          test "${{ steps.get-next-version-short-tag.outputs.version }}" = "1.1.1"
          test "${{ steps.get-next-version-short-tag.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-short-tag.outputs.createNewRelease }}" = "true"

      - name: Create temp string tag
        run: |
          git tag -d 1.1
          git tag -f prod

      - name: Run local action ignoring string tag
        id: get-next-version-string-tag
        uses: ./
        with:
          subjects: "fix: exercise string tag ignore"

      - name: Assert string tag is ignored
        run: |
          test "${{ steps.get-next-version-string-tag.outputs.bump }}" = "patch"
          test "${{ steps.get-next-version-string-tag.outputs.currentVersion }}" = "0.0.1"
          test "${{ steps.get-next-version-string-tag.outputs.version }}" = "0.0.2"
          test "${{ steps.get-next-version-string-tag.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-string-tag.outputs.createNewRelease }}" = "true"

      - name: Create temp v0 baseline tag
        run: |
          git tag -d prod
          git tag -f v0.0.1

      - name: Run local action for v1 major tag output
        id: get-next-version-major-tag
        uses: ./
        with:
          subjects: "feat!: publish v1 action release"
          tag_prefix: v
          major_tag: true

      - name: Assert v1 major tag outputs
        run: |
          test "${{ steps.get-next-version-major-tag.outputs.bump }}" = "major"
          test "${{ steps.get-next-version-major-tag.outputs.currentVersion }}" = "v0.0.1"
          test "${{ steps.get-next-version-major-tag.outputs.version }}" = "v1.0.0"
          test "${{ steps.get-next-version-major-tag.outputs.majorTag }}" = "v1"
          test "${{ steps.get-next-version-major-tag.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-major-tag.outputs.createNewRelease }}" = "true"
          test "${{ steps.get-next-version-major-tag.outputs.createMajorTag }}" = "true"

      - name: Create temp v1 baseline tag
        run: |
          git tag -d v0.0.1
          git tag -f v1.0.0

      - name: Run local action for v2 major tag output
        id: get-next-version-v2-major-tag
        uses: ./
        with:
          subjects: "feat!: publish v2 action release"
          tag_prefix: v
          major_tag: true

      - name: Assert v2 major tag outputs
        run: |
          test "${{ steps.get-next-version-v2-major-tag.outputs.bump }}" = "major"
          test "${{ steps.get-next-version-v2-major-tag.outputs.currentVersion }}" = "v1.0.0"
          test "${{ steps.get-next-version-v2-major-tag.outputs.version }}" = "v2.0.0"
          test "${{ steps.get-next-version-v2-major-tag.outputs.majorTag }}" = "v2"
          test "${{ steps.get-next-version-v2-major-tag.outputs.createNewTag }}" = "true"
          test "${{ steps.get-next-version-v2-major-tag.outputs.createNewRelease }}" = "true"
          test "${{ steps.get-next-version-v2-major-tag.outputs.createMajorTag }}" = "true"

      - name: Run local action for no matching bump
        id: get-next-version-none
        uses: ./
        with:
          subjects: "Merge pull request #123 from example/branch"

      - name: Assert no matching bump outputs
        run: |
          test "${{ steps.get-next-version-none.outputs.bump }}" = ""
          test "${{ steps.get-next-version-none.outputs.currentVersion }}" = "0.0.1"
          test "${{ steps.get-next-version-none.outputs.version }}" = "0.0.1"
          test "${{ steps.get-next-version-none.outputs.createNewTag }}" = "false"
          test "${{ steps.get-next-version-none.outputs.createNewRelease }}" = "false"

  show-next-version:
    name: Next Version Action
    needs:
      - check-pr-title
    runs-on: ubuntu-latest
    env:
      UPDATE_MAJOR_TAG: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute action
        id: get_next_version
        uses: ./
        with:
          subjects: ${{ github.event.pull_request.title || inputs.pr_title }}
          tag_prefix: v
          major_tag: ${{ env.UPDATE_MAJOR_TAG }}

      - name: Show action outputs
        run: |
          echo "currentVersion=${{ steps.get_next_version.outputs.currentVersion }}"
          echo "version=${{ steps.get_next_version.outputs.version }}"
          echo "createNewTag=${{ steps.get_next_version.outputs.createNewTag }}"
          echo "createNewRelease=${{ steps.get_next_version.outputs.createNewRelease }}"
          echo "majorTag=${{ steps.get_next_version.outputs.majorTag }}"
          echo "createMajorTag=${{ steps.get_next_version.outputs.createMajorTag }}"
          echo "bump=${{ steps.get_next_version.outputs.bump }}"
