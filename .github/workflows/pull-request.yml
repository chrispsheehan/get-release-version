name: Pull Request

on:
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        review_requested,
        ready_for_review,
        edited,
      ]
  workflow_dispatch:
    inputs:
      pr_title:
        description: "PR title to validate and use for version preview when running manually"
        required: false
        type: string
        default: "fix: manual workflow dispatch"

jobs:
  check-pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
      ALLOWED_PREFIXES: "feat: feat!: fix: fix!: chore: docs:"
    steps:
      - name: Fail if PR title does not start with an allowed prefix
        run: |
          echo "PR title: $PR_TITLE"
          for prefix in $ALLOWED_PREFIXES; do
            if [[ "$PR_TITLE" == "$prefix"* ]]; then
              echo "✅ PR title is valid."
              exit 0
            fi
          done
          echo "::error::❌ PR title must start with one of: $ALLOWED_PREFIXES"
          exit 1

  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run unit tests
        run: python -m unittest discover -v -s tests -p 'test_unit_*.py'

      - name: Run functional tests
        run: python tests/test_functional_versioning.py

  show-next-version:
    name: Next Version Action
    needs:
      - check-pr-title
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute action
        id: get_next_version
        uses: ./
        with:
          subjects: ${{ github.event.pull_request.title || inputs.pr_title }}
          tag_prefix: v

      - name: Show action outputs
        run: |
          echo "currentVersion=${{ steps.get_next_version.outputs.currentVersion }}"
          echo "version=${{ steps.get_next_version.outputs.version }}"
          echo "createNewTag=${{ steps.get_next_version.outputs.createNewTag }}"
          echo "createNewRelease=${{ steps.get_next_version.outputs.createNewRelease }}"
          echo "bump=${{ steps.get_next_version.outputs.bump }}"
