name: Release

on:
  push:
    branches:
      - main

env:
  TAG_PREFIX: v
  ENABLE_MAJOR_ALIAS: "true"

jobs:
  get-next-version:
    name: Get Next Version

    runs-on: ubuntu-latest
    outputs:
      current-version: ${{ steps.get-next-version.outputs.currentVersion }}
      tag: ${{ steps.get-next-version.outputs.version }}
      create-new-tag: ${{ steps.get-next-version.outputs.createNewTag }}
      create-new-release: ${{ steps.get-next-version.outputs.createNewRelease }}
      major-alias: ${{ steps.get-next-version.outputs.majorAlias }}
      create-major-alias: ${{ steps.get-next-version.outputs.createMajorAlias }}
      bump: ${{ steps.get-next-version.outputs.bump }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get-next-version
        uses: ./
        with:
          tag_prefix: ${{ env.TAG_PREFIX }}
          major_alias: ${{ env.ENABLE_MAJOR_ALIAS }}

  create-tag:
    name: Tags
    needs: 
      - get-next-version
    if: ${{ needs.get-next-version.outputs.create-new-tag == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.get-next-version.outputs.tag }}
      MAJOR_ALIAS_TAG: ${{ needs.get-next-version.outputs.major-alias }}
      CREATE_MAJOR_ALIAS: ${{ needs.get-next-version.outputs.create-major-alias }}
    steps:
      - uses: actions/checkout@v6
      - name: Create release tag
        run: |
          echo "Tagging $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Update moving major alias
        if: ${{ env.CREATE_MAJOR_ALIAS == 'true' }}
        run: |
          echo "Updating $MAJOR_ALIAS_TAG to $GITHUB_SHA"
          git tag -f "$MAJOR_ALIAS_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$MAJOR_ALIAS_TAG"

      - name: Skip moving major alias
        if: ${{ env.CREATE_MAJOR_ALIAS != 'true' }}
        run: echo "Skipping major alias update for $TAG"

  get-commits:
    name: Commits
    needs:
      - create-tag
      - get-next-version
    if: ${{ needs.get-next-version.outputs.create-new-release == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.commits.outputs.commits }}
    env:
      TAG: ${{ needs.get-next-version.outputs.tag }}
      CURRENT_TAG: ${{ needs.get-next-version.outputs.current-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get commit messages
        id: commits
        run: |
          if git rev-parse -q --verify "refs/tags/${CURRENT_TAG}" >/dev/null; then
            RANGE="${CURRENT_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          COMMITS=$(git log "$RANGE" --pretty=format:"* %s")
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - get-next-version
      - create-tag
      - get-commits
    if: ${{ needs.get-next-version.outputs.create-new-release == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-next-version.outputs.tag }}
          body: |
            Release Notes:
            ${{ needs.get-commits.outputs.commits }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
